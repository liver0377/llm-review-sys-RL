model:
  model_id_or_path: models/qwen3-8b-base
  trust_remote_code: true

dataset:
  train_dataset: data/openreview_dataset/rm_train.json
  val_dataset: data/openreview_dataset/rm_val.json
  max_length: 16384
  train_dataset_sample: -1

training:
  output_dir: models/reward_model_qwen3_8b
  tuner_type: full
  torch_dtype: bfloat16
  
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 4 
  
  learning_rate: 1.0e-5
  weight_decay: 0.01
  warmup_ratio: 0.1
  num_train_epochs: 2
  
  gradient_checkpointing: true
  bf16: true
  
  eval_strategy: steps
  eval_steps: 100
  save_steps: 200
  save_total_limit: 2
  logging_steps: 1 
  
  deepspeed: configs/deepspeed_zero3_config.json

rlhf:
  rlhf_type: rm
  beta: 0.1
  label_smoothing: 0.0

wandb:
  project: reward_model_grpo
  run_name: rm_qwen3_8b_v1
