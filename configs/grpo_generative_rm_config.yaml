model:
  model_id_or_path: models/qwen3-8b-base
  trust_remote_code: true

reward_model:
  model_id_or_path: models/qwen3.5-35b-a3b
  model_type: qwen
  trust_remote_code: true

dataset:
  train_dataset: data/openreview_dataset/grpo_train.json
  val_dataset: data/openreview_dataset/grpo_val.json
  max_length: 16384
  max_new_tokens: 2000
  train_dataset_sample: -1

training:
  output_dir: models/grpo_qwen3_8b_generative_rm
  tuner_type: full
  torch_dtype: bfloat16

  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 8

  learning_rate: 5.0e-7
  weight_decay: 0.01
  warmup_ratio: 0.05
  num_train_epochs: 1

  gradient_checkpointing: true
  bf16: true

  eval_strategy: steps
  eval_steps: 50
  save_steps: 100
  save_total_limit: 2
  logging_steps: 5

  deepspeed: configs/deepspeed_zero3_config.json

rlhf:
  rlhf_type: grpo
  num_generations: 4
  temperature: 0.7
  top_p: 0.9
  beta: 0.1

reward:
  reward_func: train.code.reward_function:combined_reward
  alpha: 1.0
  format_weight: 1.0

vllm:
  use_vllm: true
  vllm_mode: colocate
  vllm_gpu_memory_utilization: 0.3
  vllm_max_model_len: 16384
  vllm_enforce_eager: true

optimization:
  offload_optimizer: true
  offload_model: true
  sleep_level: 1

wandb:
  project: grpo_training
  run_name: grpo_qwen3_8b_generative_rm_v1
